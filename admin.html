<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giacomino — Admin Console</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cyan:   #00f5ff;
      --green:  #39ff14;
      --pink:   #ff2d9b;
      --yellow: #ffe600;
      --black:  #050a0e;
      --navy:   #0a1628;
      --panel:  #0d1f35;
      --mid:    #112240;
      --glow:   #00f5ff44;
      --text:   #c8e8f0;
      --dim:    #5a8fa0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Courier Prime', monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--glow);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      color: var(--cyan);
      text-shadow: 0 0 10px var(--cyan);
      white-space: nowrap;
    }
    .logo span { color: var(--pink); }
    .header-badge {
      font-family: 'VT323', monospace;
      font-size: 0.85rem;
      color: var(--yellow);
      border: 1px solid var(--yellow);
      padding: 2px 10px;
      letter-spacing: 2px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      box-shadow: 0 0 6px var(--dim);
      margin-left: auto;
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.6} }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* ── SIDEBAR sessioni ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid var(--glow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--glow);
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .btn-refresh {
      background: transparent;
      border: 1px solid var(--glow);
      color: var(--cyan);
      font-family: 'VT323', monospace;
      font-size: 1rem;
      padding: 2px 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-refresh:hover { border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
    .sessions-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .sessions-list::-webkit-scrollbar { width: 3px; }
    .sessions-list::-webkit-scrollbar-thumb { background: var(--glow); }
    .session-item {
      padding: 10px 14px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    .session-item:hover { background: var(--mid); }
    .session-item.active { background: var(--mid); border-left-color: var(--cyan); }
    .session-id {
      font-family: 'VT323', monospace;
      font-size: 0.9rem;
      color: var(--cyan);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-meta {
      font-size: 0.65rem;
      color: var(--dim);
      margin-top: 2px;
    }
    .session-unread {
      display: inline-block;
      background: var(--pink);
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 6px;
    }
    .empty-sessions {
      padding: 20px 14px;
      font-size: 0.75rem;
      color: var(--dim);
      text-align: center;
      line-height: 1.8;
    }

    /* ── CHAT PANEL ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-topbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--glow);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: var(--panel);
    }
    .chat-session-label {
      font-family: 'VT323', monospace;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: 1px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .btn-delete {
      background: transparent;
      border: 1px solid #ff444466;
      color: #ff6666;
      font-family: 'VT323', monospace;
      font-size: 0.85rem;
      padding: 3px 10px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-delete:hover { border-color: #ff4444; box-shadow: 0 0 8px #ff444466; }
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .messages-area::-webkit-scrollbar { width: 3px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--glow); }
    .msg { max-width: 75%; }
    .msg.user { align-self: flex-end; }
    .msg.bot, .msg.giacomino { align-self: flex-start; }
    .msg-name {
      font-family: 'VT323', monospace;
      font-size: 0.78rem;
      margin-bottom: 3px;
      letter-spacing: 1px;
    }
    .msg.user .msg-name { color: var(--dim); text-align: right; }
    .msg.bot .msg-name, .msg.giacomino .msg-name { color: var(--pink); }
    .msg-bubble {
      padding: 8px 12px;
      font-size: 0.82rem;
      line-height: 1.5;
    }
    .msg.user .msg-bubble { background: rgba(0,245,255,0.1); border: 1px solid var(--cyan); color: var(--cyan); }
    .msg.bot .msg-bubble, .msg.giacomino .msg-bubble { background: var(--panel); border: 1px solid var(--glow); color: var(--text); }
    .msg-time { font-size: 0.58rem; color: var(--dim); margin-top: 3px; }
    .msg.user .msg-time { text-align: right; }
    .no-session {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--dim);
    }
    .no-session-icon { font-family: 'VT323', monospace; font-size: 4rem; color: var(--glow); }
    .no-session-text { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }

    /* ── INPUT RISPOSTA ── */
    .reply-area {
      border-top: 1px solid var(--glow);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .reply-input {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--glow);
      color: var(--text);
      font-family: 'Courier Prime', monospace;
      font-size: 0.84rem;
      padding: 10px 12px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      transition: border-color 0.2s;
    }
    .reply-input:focus { border-color: var(--cyan); }
    .reply-input::placeholder { color: var(--dim); }
    .btn-send {
      background: var(--cyan);
      color: #000;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      letter-spacing: 1px;
      white-space: nowrap;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-send:hover { background: #00e0eb; box-shadow: 0 0 12px var(--cyan); }
    .btn-send:disabled { background: var(--dim); cursor: not-allowed; box-shadow: none; }

    /* ── RISPOSTE RAPIDE ── */
    .quick-replies {
      border-top: 1px solid var(--glow);
      padding: 8px 16px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .qr-label { font-size: 0.6rem; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; align-self: center; margin-right: 4px; }
    .qr-btn {
      background: transparent;
      border: 1px solid var(--glow);
      color: var(--dim);
      font-family: 'Courier Prime', monospace;
      font-size: 0.68rem;
      padding: 3px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .qr-btn:hover { border-color: var(--cyan); color: var(--cyan); }

    /* loading */
    .loading { padding: 20px; text-align: center; color: var(--dim); font-size: 0.75rem; letter-spacing: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <span class="logo">Giacomino <span>// Admin</span></span>
  <span class="header-badge">CONSOLE v1.0</span>
  <div class="status-dot" id="statusDot"></div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Sessioni attive</span>
      <button class="btn-refresh" id="btnRefresh" title="Aggiorna lista">↺</button>
    </div>
    <div class="sessions-list" id="sessionsList">
      <div class="empty-sessions">Connessione in corso...</div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div class="chat-panel" id="chatPanel">

    <!-- stato iniziale: nessuna sessione selezionata -->
    <div class="no-session" id="noSession">
      <div class="no-session-icon">📭</div>
      <div class="no-session-text">seleziona una sessione</div>
    </div>

    <!-- chat attiva (nascosta finché non si seleziona) -->
    <div id="activeChat" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
      <div class="chat-topbar">
        <span class="chat-session-label" id="chatSessionLabel">—</span>
        <button class="btn-delete" id="btnDeleteSession">🗑 elimina chat</button>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="quick-replies" id="quickReplies">
        <span class="qr-label">rapide:</span>
      </div>
      <div class="reply-area">
        <textarea class="reply-input" id="replyInput" placeholder="scrivi la risposta di Giacomino..." rows="1"></textarea>
        <button class="btn-send" id="btnSend" disabled>INVIA ▶</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getDatabase, ref, get, push, remove,
           onChildAdded, onValue, off }             from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

  // ── CONFIGURAZIONE — stessa del sito principale ──────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyBKiYmmAs5pSbDB0akosVMzZOuQAxfr4PA",
    authDomain:        "giovanninovaipianino.firebaseapp.com",
    databaseURL:       "https://giovanninovaipianino-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "giovanninovaipianino",
    storageBucket:     "giovanninovaipianino.firebasestorage.app",
    messagingSenderId: "587962693500",
    appId:             "1:587962693500:web:03c165060efdbcf13296f9"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── RISPOSTE RAPIDE ──────────────────────────────────────────
  const QUICK = [
    { label: 'Presa in carico',  text: 'ciao! ho ricevuto il tuo problemino, ci sto dando un\'occhiatina 🔧' },
    { label: 'Spegni/riaccendi', text: 'prova a spegnere e riaccendere il computerino! funziona nel 99.8% dei casi 🔌' },
    { label: 'Serve info',       text: 'per aiutarti meglio, che sistema operativo hai? e da quando ti fa i capriccini? 🖥️' },
    { label: 'Risolto ✓',        text: 'ottima notizia! il problemino è risolto grazie al metodo giacomino™. buona informatica! ✅' },
    { label: 'Attendi',          text: 'ricevuto! ci sto lavorando, ti rispondo entro poco con la soluzionina definitiva 💾' },
  ];

  // ── DOM ───────────────────────────────────────────────────────
  const sessionsList   = document.getElementById('sessionsList');
  const noSession      = document.getElementById('noSession');
  const activeChat     = document.getElementById('activeChat');
  const messagesArea   = document.getElementById('messagesArea');
  const replyInput     = document.getElementById('replyInput');
  const btnSend        = document.getElementById('btnSend');
  const btnRefresh     = document.getElementById('btnRefresh');
  const btnDelete      = document.getElementById('btnDeleteSession');
  const chatLabel      = document.getElementById('chatSessionLabel');
  const statusDot      = document.getElementById('statusDot');
  const quickReplies   = document.getElementById('quickReplies');

  // ── STATO ─────────────────────────────────────────────────────
  let currentSession   = null;
  let currentListener  = null;
  let sessions         = {};   // sessionId -> { msgCount, lastText }

  // ── STATUS DOT ───────────────────────────────────────────────
  statusDot.classList.add('connected');

  // ── RISPOSTE RAPIDE: genera i pulsanti ────────────────────────
  QUICK.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = q.label;
    btn.addEventListener('click', () => {
      replyInput.value = q.text;
      replyInput.dispatchEvent(new Event('input'));
      replyInput.focus();
    });
    quickReplies.appendChild(btn);
  });

  // ── CARICA LISTA SESSIONI ─────────────────────────────────────
  async function loadSessions() {
    sessionsList.innerHTML = '<div class="loading">caricamento...</div>';
    try {
      const snap = await get(ref(db, 'chats'));
      if (!snap.exists()) {
        sessionsList.innerHTML = '<div class="empty-sessions">Nessuna sessione ancora.<br/>Aspetta che qualcuno scriva!</div>';
        return;
      }
      sessions = {};
      snap.forEach(child => {
        const msgs = child.child('messages');
        let count = 0, lastText = '', lastTime = '';
        msgs.forEach(m => {
          count++;
          const v = m.val();
          if (v) { lastText = v.text || ''; lastTime = v.time || ''; }
        });
        sessions[child.key] = { count, lastText, lastTime };
      });
      renderSessionList();
    } catch(e) {
      sessionsList.innerHTML = `<div class="empty-sessions">Errore: ${e.message}</div>`;
    }
  }

  function renderSessionList() {
    sessionsList.innerHTML = '';
    const keys = Object.keys(sessions);
    if (!keys.length) {
      sessionsList.innerHTML = '<div class="empty-sessions">Nessuna sessione ancora.<br/>Aspetta che qualcuno scriva!</div>';
      return;
    }
    keys.forEach(id => {
      const s = sessions[id];
      const div = document.createElement('div');
      div.className = 'session-item' + (id === currentSession ? ' active' : '');
      div.dataset.id = id;

      // etichetta corta: ultime 12 cifre dell'id
      const shortId = id.replace('session_', '').slice(-16);
      div.innerHTML = `
        <div class="session-id" title="${id}">${shortId}</div>
        <div class="session-meta">${s.count} msg · ${s.lastTime || '—'} · ${escHtml(s.lastText.slice(0,28))}${s.lastText.length>28?'…':''}</div>
      `;
      div.addEventListener('click', () => openSession(id));
      sessionsList.appendChild(div);
    });
  }

  // ── APRI SESSIONE ─────────────────────────────────────────────
  async function openSession(sessionId) {
    // rimuovi vecchio listener
    if (currentListener) {
      off(ref(db, `chats/${currentSession}/messages`));
      currentListener = null;
    }

    currentSession = sessionId;
    chatLabel.textContent = sessionId.replace('session_', '').slice(-24);
    messagesArea.innerHTML = '';
    noSession.style.display = 'none';
    activeChat.style.display = 'flex';
    btnSend.disabled = false;

    // aggiorna selezione sidebar
    document.querySelectorAll('.session-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === sessionId);
    });

    const shownKeys = new Set();

    function renderMsg(snap) {
      if (shownKeys.has(snap.key)) return;
      shownKeys.add(snap.key);
      const msg = snap.val();
      if (!msg) return;
      const isGiac = msg.sender === 'giacomino' || msg.sender === 'bot';
      const div = document.createElement('div');
      div.classList.add('msg', isGiac ? 'giacomino' : 'user');
      div.id = 'amsg-' + snap.key;
      div.innerHTML = `
        <div class="msg-name">${isGiac ? '🤖 Giacomino' : '👤 Utente'}</div>
        <div class="msg-bubble">${escHtml(msg.text || '')}</div>
        <div class="msg-time">${msg.time || ''}</div>
      `;
      messagesArea.appendChild(div);
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // carica storia esistente
    const existing = await get(ref(db, `chats/${sessionId}/messages`));
    const pendingSnaps = [];
    let historyLoaded = false;

    // listener tempo reale
    currentListener = onChildAdded(ref(db, `chats/${sessionId}/messages`), (snap) => {
      if (!historyLoaded) { pendingSnaps.push(snap); return; }
      renderMsg(snap);
    });

    if (existing.exists()) existing.forEach(s => renderMsg(s));
    historyLoaded = true;
    pendingSnaps.forEach(s => renderMsg(s));
  }

  // ── INVIA RISPOSTA ────────────────────────────────────────────
  async function sendReply() {
    const text = replyInput.value.trim();
    if (!text || !currentSession) return;
    btnSend.disabled = true;
    try {
      const t = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      await push(ref(db, `chats/${currentSession}/messages`), {
        sender: 'giacomino',
        text,
        time: t,
        timestamp: Date.now()
      });
      replyInput.value = '';
      replyInput.style.height = 'auto';
    } catch(e) {
      alert('Errore invio: ' + e.message);
    }
    btnSend.disabled = false;
    replyInput.focus();
  }

  // ── ELIMINA SESSIONE ──────────────────────────────────────────
  btnDelete.addEventListener('click', async () => {
    if (!currentSession) return;
    if (!confirm(`Eliminare la sessione?\n${currentSession}\n\nI messaggi verranno cancellati da Firebase.`)) return;
    try {
      await remove(ref(db, `chats/${currentSession}`));
      currentSession = null;
      noSession.style.display = 'flex';
      activeChat.style.display = 'none';
      btnSend.disabled = true;
      await loadSessions();
    } catch(e) {
      alert('Errore eliminazione: ' + e.message);
    }
  });

  // ── EVENT LISTENERS ───────────────────────────────────────────
  btnSend.addEventListener('click', sendReply);
  btnRefresh.addEventListener('click', loadSessions);

  replyInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
  });
  replyInput.addEventListener('input', () => {
    replyInput.style.height = 'auto';
    replyInput.style.height = Math.min(replyInput.scrollHeight, 120) + 'px';
    btnSend.disabled = !replyInput.value.trim() || !currentSession;
  });

  // ── UTILS ─────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── AVVIO ─────────────────────────────────────────────────────
  loadSessions();

  // aggiorna la lista ogni 30 secondi in background
  setInterval(loadSessions, 30000);
</script>
</body>
</html>
